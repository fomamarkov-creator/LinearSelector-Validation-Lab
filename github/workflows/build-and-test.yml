name: Build and Secure Release

on: [push, pull_request]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install CUDA Toolkit
      uses: jimmy-park/install-cuda-action@v1.7
      with:
        cuda_version: '12.1.0'

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_ARCHITECTURES=80 ..

    - name: Build EXE
      run: |
        cd build
        cmake --build . --config Release

    - name: Upload Artifact (Download your EXE here)
      uses: actions/upload-artifact@v3
      with:
        name: LinearSelector-V144-Windows
        path: build/Release/LinearSelectorBenchmark.exe
