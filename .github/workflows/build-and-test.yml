name: Manual Build LinearSelector V144

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-linux:
    name: Build & Test (Ubuntu + CUDA)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.21
      with:
        cuda: '12.1.0'

    - name: Configure CMake
      run: |
        mkdir build
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_ARCHITECTURES=80

    - name: Build Project
      run: |
        cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LinearSelector-V144-Linux-Binary
        path: build/LinearSelectorBenchmark
        retention-days: 5
