# V-CORE v152 - REAL ENGINE ASSEMBLY

name: V-CORE v152 FINAL

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
      - name: Install Dependencies
        run: pip install torch safetensors numpy pyinstaller customtkinter

      # СОБИРАЕМ РЕАЛЬНЫЙ ДВИЖОК (Без test_core.cpp)
      - name: Bundle Real Engine
        run: |
          pyinstaller --onefile --noconsole --name "MARKOV_ENGINE" bridge_compressor.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v152_REAL_ENGINE
          path: dist/MARKOV_ENGINE.exe
