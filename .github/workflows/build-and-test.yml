# Build system for 🛡️ Markov Shield AI v146 (Offline LIGO Edition)

name: V-CORE v146 OFFLINE BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
          method: 'network'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile CUDA Core
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          & $nvcc -arch=sm_75 -c LinearSelector.cu -o LinearSelector.obj `
            -I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" `
            -allow-unsupported-compiler `
            --compiler-options "/O2 /MD /EHsc /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH"

      - name: Link Final Benchmark
        shell: pwsh
        run: |
          $cudaLib = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64"
          $cudaInc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include"
          cl.exe /O2 /MD /EHsc /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH test_core.cpp LinearSelector.obj `
            /I"$cudaInc" `
            /link /LIBPATH:"$cudaLib" cudart.lib `
            /OUT:LinearSelectorBenchmark.exe

      - name: Install Python Dependencies
        run: pip install torch safetensors numpy pyinstaller

      # Упаковка полностью автономного EXE (без интернета)
      - name: Bundle Autonomous EXE
        run: |
          pyinstaller --onefile `
            --exclude-module matplotlib --exclude-module notebook --exclude-module PIL `
            --exclude-module huggingface_hub `
            --add-binary "LinearSelectorBenchmark.exe;." `
            --name "Markov_Shield_v146_LIGO_OFFLINE" `
            bridge_compressor.py

      - name: Upload Offline Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v146_OFFLINE_READY
          path: dist/Markov_Shield_v146_LIGO_OFFLINE.exe
