# V-CORE v152.3 - EXTREME MANUAL ASSEMBLY (LIGO PROTOCOL)

name: V-CORE v152.3 FULL ASSEMBLY

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch safetensors numpy pyinstaller customtkinter huggingface_hub

      # ШАГ 1: ЖЕСТКАЯ КОНФИГУРАЦИЯ CMAKE С УКАЗАНИЕМ ПУТИ К NVCC
      - name: Configure CMake
        run: |
          mkdir build
          cd build
          # Указываем путь к компилятору напрямую, чтобы избежать ошибки 0x2
          cmake .. -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_CUDA_COMPILER="C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v11.8/bin/nvcc.exe"

      # ШАГ 2: СБОРКА НАТИВНОГО ДВИЖКА
      - name: Build Engine (C++/CUDA)
        run: |
          cd build
          cmake --build . --config Release

      # ШАГ 3: ПОДГОТОВКА И ПРОВЕРКА БИНАРНИКА
      - name: Prepare Assets
        run: |
          copy build\Release\VCORE_v147_STATIC_GPU.exe .
          if (Test-Path "VCORE_v147_STATIC_GPU.exe") { echo "V-CORE ENGINE READY" } else { exit 1 }

      # ШАГ 4: УПАКОВКА В ЕДИНЫЙ EXE (ДЛЯ ASUS X541N)
      - name: Bundle with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name "MARKOV_ENGINE_v152" `
          --add-binary "VCORE_v147_STATIC_GPU.exe;." `
          --hidden-import "huggingface_hub" `
          gui_v149.2.py

      # ШАГ 5: ВЫГРУЗКА ГОТОВОГО РЕЛИЗА
      - name: Upload V-CORE Release
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v152_FINAL_DIST
          path: dist/MARKOV_ENGINE_v152.exe
