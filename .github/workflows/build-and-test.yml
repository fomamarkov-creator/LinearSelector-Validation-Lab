name: Manual Build LinearSelector V144

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-linux:
    name: Build & Test (Ubuntu + CUDA)
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install CUDA Core
      run: |
        # Прямая установка без скачивания deb-файлов, которые часто меняются
        sudo apt-get update
        sudo apt-get install -y nvidia-cuda-toolkit
        # Проверка наличия nvcc
        nvcc --version

    - name: Configure CMake
      run: |
        # В Ubuntu-latest nvcc обычно в /usr/bin/
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_ARCHITECTURES=80 -DCMAKE_CUDA_COMPILER=$(which nvcc)

    - name: Build Project
      run: |
        cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LinearSelector-V144-Protected
        path: build/LinearSelectorBenchmark
