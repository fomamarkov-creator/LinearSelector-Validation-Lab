# Build system for 🛡️ Markov Shield AI v148 (Flash Edition)

name: V-CORE v148 FLASH BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
          method: 'network'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # СБОРКА 1: GPU Ядро (Static)
      - name: Build Static GPU Core
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          & $nvcc -arch=sm_75 -c LinearSelector.cu -o LinearSelector.obj `
            -I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" `
            -allow-unsupported-compiler `
            --compiler-options "/O2 /MT /EHsc /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH"

          cl.exe /O2 /MT /EHsc /DUSE_CUDA test_core.cpp LinearSelector.obj `
            /I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" `
            /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH `
            /link /LIBPATH:"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" `
            cudart_static.lib /NODEFAULTLIB:LIBCMT /OUT:VCORE_GPU.exe

      # СБОРКА 2: CPU Ядро (Mobile/Universal)
      - name: Build CPU Core
        shell: pwsh
        run: |
          cl.exe /O2 /MT /EHsc test_core.cpp /OUT:VCORE_CPU.exe

      - name: Install Python Dependencies
        run: pip install torch safetensors numpy pyinstaller

      # Упаковка: Собираем "Универсальный Нож"
      - name: Bundle v148 Universal EXE
        shell: pwsh
        run: |
          pyinstaller --onefile `
            --exclude-module matplotlib --exclude-module notebook --exclude-module PIL `
            --exclude-module huggingface_hub `
            --add-binary "VCORE_GPU.exe;." `
            --add-binary "VCORE_CPU.exe;." `
            --name "Markov_Shield_v148_FLASH" `
            bridge_compressor.py

      - name: Upload Final Build
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v148_READY
          path: dist/Markov_Shield_v148_FLASH.exe
