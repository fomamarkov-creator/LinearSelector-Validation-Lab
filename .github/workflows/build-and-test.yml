name: V-CORE QWEN OPTIMIZER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # Используем стандартный сервер, CUDA установим вручную
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install AI Dependencies
      run: |
        pip install torch safetensors huggingface_hub numpy

    - name: Install CUDA Toolkit
      run: |
        # Установка CUDA 12.1 для компиляции LinearSelector.cu
        wget https://nvidia.com
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo apt-get update
        sudo apt-get -y install cuda-toolkit-12-1

    - name: Configure CMake
      run: |
        export PATH=/usr/local/cuda-12.1/bin${PATH:+:${PATH}}
        cmake -S . -B build -DCMAKE_CUDA_ARCHITECTURES=75

    - name: Build V144 Core
      run: cmake --build build --config Release

    - name: Run Qwen Optimization
      run: |
        # Копируем скрипт в папку с бинарником и запускаем
        cp bridge_compressor.py build/
        cd build
        chmod +x LinearSelectorBenchmark
        python bridge_compressor.py

    - name: Upload Optimized Model
      uses: actions/upload-artifact@v4
      with:
        name: v144-qwen-coder
        path: build/v144_*.safetensors
