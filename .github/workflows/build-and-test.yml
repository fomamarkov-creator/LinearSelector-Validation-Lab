# Build system for 🛡️ Markov Shield AI v144 (Exabit Edition)

name: V-CORE EXE RELEASE BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA
        # Убрали сложную версию, ставим просто 11.8
        run: choco install cuda --version=11.8 -y --no-progress

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Manual Super-Build (No CMake Errors)
        shell: pwsh
        run: |
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8"
          $nvcc = "$cudaPath\bin\nvcc.exe"
          
          # 1. Компилируем ядро CUDA напрямую
          & $nvcc -arch=sm_75 -c LinearSelector.cu -o LinearSelector.obj `
            -I"$cudaPath\include" --compiler-options "/O2 /MD"

          # 2. Компилируем C++ интерфейс и линкуем с CUDA вручную
          cl.exe /O2 /MD test_core.cpp LinearSelector.obj `
            /I"$cudaPath\include" `
            /link /LIBPATH:"$cudaPath\lib\x64" cudart.lib `
            /OUT:LinearSelectorBenchmark.exe

      - name: Install Python Dependencies
        run: pip install torch safetensors huggingface_hub numpy pyinstaller

      - name: Execute Exabit Optimization
        run: python bridge_compressor.py

      - name: Bundle Autonomous EXE
        run: |
          pyinstaller --onefile `
            --add-binary "LinearSelectorBenchmark.exe;." `
            --name "Markov_Shield_v144" `
            bridge_compressor.py

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v144-exabit-final
          name: "Markov Shield AI v144 (Exabit EXE)"
          files: |
            dist/Markov_Shield_v144.exe
            v144_model.safetensors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
