# Build system for 🛡️ Markov Shield AI v144 (Exabit Edition)

name: V-CORE EXE RELEASE BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install torch safetensors huggingface_hub numpy pyinstaller
          choco install ninja

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake (V-CORE Ninja Mode)
        shell: pwsh
        run: |
          $env:CUDA_PATH = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8"
          $env:PATH = "$env:CUDA_PATH\bin;$env:PATH"
          
          # Мы передаем путь к NVCC напрямую в переменную CMAKE_CUDA_COMPILER.
          # Это позволит вашему новому CMakeLists.txt успешно выполнить enable_language(CUDA).
          cmake -S . -B build -G "Ninja" `
          -DCMAKE_CUDA_COMPILER="$env:CUDA_PATH\bin\nvcc.exe" `
          -DCMAKE_CUDA_ARCHITECTURES=75 `
          -DCMAKE_BUILD_TYPE=Release

      - name: Build V144 Core Binary
        run: cmake --build build --config Release

      - name: Execute Exabit Optimization
        shell: pwsh
        run: |
          # Ninja кладет файл прямо в корень build, в отличие от Visual Studio
          Copy-Item "bridge_compressor.py" -Destination "build/" -Force
          cd build
          python bridge_compressor.py

      - name: Bundle Autonomous EXE
        run: |
          # Собираем всё в один EXE
          pyinstaller --onefile `
          --add-binary "build/LinearSelectorBenchmark.exe;." `
          --name "Markov_Shield_v144" `
          build/bridge_compressor.py

      - name: Create Clean GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v144-exabit-final
          name: "Markov Shield AI v144 (Exabit EXE)"
          files: |
            dist/Markov_Shield_v144.exe
            build/v144_model.safetensors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
