# V-CORE v150 - THE UNBREAKABLE RELEASE

name: V-CORE v150 RELEASE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write # РАЗРЕШАЕМ ЗАПИСЬ ФАЙЛОВ В РЕЛИЗ
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CUDA
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Cores
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          & $nvcc -arch=sm_75 -o VCORE_GPU.exe LinearSelector.cu test_core.cpp -I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" -L"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" -lcudart --compiler-options "/O2 /MT /EHsc"
          cl.exe /O2 /MT /EHsc test_core.cpp /OUT:VCORE_CPU.exe

      - name: Create Release and Upload Files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v150-final-${{ github.run_number }}
          name: V-CORE v150 FINAL (LIGO READY)
          draft: false
          prerelease: false
          # ЖЕСТКО УКАЗЫВАЕМ ФАЙЛЫ
          files: |
            VCORE_GPU.exe
            VCORE_CPU.exe
            bridge_compressor.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
