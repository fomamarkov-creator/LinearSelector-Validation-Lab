# V-CORE v152.2 - CLOUD-INTEGRATED ASSEMBLY (LIGO PROTOCOL)

name: V-CORE v152.2 FULL ASSEMBLY

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Добавлена библиотека huggingface_hub для облачной синхронизации
          pip install torch safetensors numpy pyinstaller customtkinter huggingface_hub

      # ШАГ 1: КОМПИЛЯЦИЯ CUDA-ЯДРА (ДВИЖКА) С ПОДДЕРЖКОЙ AVX2/GPU
      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build Engine (C++/CUDA)
        run: |
          cd build
          cmake --build . --config Release

      # ШАГ 2: ПОДГОТОВКА БИНАРНЫХ АРТЕФАКТОВ
      - name: Prepare Assets
        run: |
          # Копируем скомпилированный движок в корень к Python-скрипту
          copy build\Release\VCORE_v147_STATIC_GPU.exe .
          # Проверка успешности компиляции
          if (Test-Path "VCORE_v147_STATIC_GPU.exe") { echo "Engine V-CORE Built Successfully" } else { exit 1 }

      # ШАГ 3: СБОРКА ЕДИНОГО ИСПОЛНЯЕМОГО ФАЙЛА (FULL OFFLINE + CLOUD)
      # --add-binary включает CUDA-движок внутрь .exe файла
      # --hidden-import гарантирует включение зависимостей HuggingFace
      - name: Bundle with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name "MARKOV_ENGINE_v152" `
          --add-binary "VCORE_v147_STATIC_GPU.exe;." `
          --hidden-import "huggingface_hub" `
          gui_v149.2.py

      # ШАГ 4: ВЫГРУЗКА ГОТОВОГО РЕЛИЗА
      - name: Upload V-CORE Release
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v152_FINAL_DIST
          path: dist/MARKOV_ENGINE_v152.exe
