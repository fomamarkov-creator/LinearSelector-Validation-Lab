# V-CORE v149 - THE STABLE SIMS-INTERFACE PACK

name: V-CORE v149 FINAL BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
          method: 'network'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # 1. КАЧЕСТВЕННАЯ СБОРКА ЯДЕР
      - name: Build Binary Cores
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          & $nvcc -arch=sm_75 -c LinearSelector.cu -o ./LinearSelector.obj --compiler-options "/O2 /MT /EHsc /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH"
          cl.exe /O2 /MT /EHsc /DUSE_CUDA test_core.cpp ./LinearSelector.obj /I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" /link /LIBPATH:"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" cudart_static.lib Kernel32.lib User32.lib /OUT:VCORE_GPU.exe
          cl.exe /O2 /MT /EHsc test_core.cpp /OUT:VCORE_CPU.exe

      - name: Install Dependencies
        run: pip install torch safetensors numpy customtkinter pyinstaller

      # 2. СБОРКА ИНТЕРФЕЙСА (Отдельно, для надежности)
      - name: Build GUI
        run: pyinstaller --onefile --noconsole --name "Markov_Sims_UI" gui_v149.py

      # 3. ВЫГРУЗКА ВСЕГО КОМПЛЕКТА (В один ZIP)
      - name: Upload Final Pack
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v149_LIGO_PACK
          path: |
            VCORE_GPU.exe
            VCORE_CPU.exe
            dist/Markov_Sims_UI.exe
            README.md
