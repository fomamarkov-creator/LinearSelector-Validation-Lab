# V-CORE v152.5 - DIRECT NVCC ASSEMBLY (ULTIMATE BYPASS)

name: V-CORE v152.5 FULL ASSEMBLY

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch safetensors numpy pyinstaller customtkinter huggingface_hub

      # ШАГ 1: ПРЯМАЯ КОМПИЛЯЦИЯ ЧЕРЕЗ NVCC (Обход ошибок CMake)
      - name: Build Engine with NVCC
        run: |
          # Задаем пути вручную
          $env:PATH += ";C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin"
          $cuda_lib = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64\cudart.lib"
          $cuda_inc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include"
          
          # Компилируем .cu и .cpp файлы в один экзешник
          nvcc -O3 main.cpp LinearSelector.cu -o VCORE_v147_STATIC_GPU.exe `
          -I $cuda_inc -L "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" `
          -lcudart -D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH
          
          if (Test-Path "VCORE_v147_STATIC_GPU.exe") { echo "V-CORE ENGINE BUILT DIRECTLY" } else { exit 1 }

      # ШАГ 2: ПОДГОТОВКА И ПРОВЕРКА
      - name: Prepare Assets
        run: |
          # Файл уже в корне после прямой компиляции
          if (Test-Path "VCORE_v147_STATIC_GPU.exe") { echo "Ready for bundling" }

      # ШАГ 3: УПАКОВКА В ЕДИНЫЙ EXE (ДЛЯ ASUS X541N)
      - name: Bundle with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name "MARKOV_ENGINE_v152" `
          --add-binary "VCORE_v147_STATIC_GPU.exe;." `
          --hidden-import "huggingface_hub" `
          gui_v149.2.py

      # ШАГ 4: ВЫГРУЗКА ГОТОВОГО РЕЛИЗА
      - name: Upload V-CORE Release
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v152_FINAL_DIST
          path: dist/MARKOV_ENGINE_v152.exe
