# V-CORE v150 - GHOST PROTOCOL (Masked Assembly)

name: V-CORE v150 FINAL BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
          method: 'network'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # КОМПИЛЯЦИЯ С МАСКИРОВКОЙ ПОД .DAT
      - name: Build Binary Cores (Masked)
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          
          # 1. GPU Ядро (маскируем под .dat)
          & $nvcc -arch=sm_75 -o VCORE_GPU.dat LinearSelector.cu test_core.cpp `
            -I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" `
            -L"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" -lcudart `
            --compiler-options "/O2 /MT /EHsc /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH"

          # 2. CPU Ядро (маскируем под .dat)
          cl.exe /O2 /MT /EHsc test_core.cpp /OUT:VCORE_CPU.dat

      # ПРОВЕРКА НАЛИЧИЯ (Посмотри лог этого шага!)
      - name: Check Ghost Files
        run: dir *.dat

      # ВЫГРУЗКА БЕЗ ПРОВЕРОК
      - name: Upload Ghost Pack
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v150_GHOST_READY
          path: |
            VCORE_GPU.dat
            VCORE_CPU.dat
            bridge_compressor.py
