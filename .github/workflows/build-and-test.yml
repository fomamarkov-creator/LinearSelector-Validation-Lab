# V-CORE v149 - THE QUALITY SIMS-INTERFACE (STATIC)

name: V-CORE v149 FINAL BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
          method: 'network'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # 1. КАЧЕСТВЕННАЯ СБОРКА ЯДЕР (Статическая линковка)
      - name: Build Binary Cores
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          & $nvcc -arch=sm_75 -c LinearSelector.cu -o ./LinearSelector.obj --compiler-options "/O2 /MT /EHsc /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH"
          cl.exe /O2 /MT /EHsc /DUSE_CUDA test_core.cpp ./LinearSelector.obj /I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" /link /LIBPATH:"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" cudart_static.lib Kernel32.lib User32.lib Gdi32.lib Shell32.lib /NODEFAULTLIB:LIBCMT /OUT:VCORE_GPU.exe
          cl.exe /O2 /MT /EHsc test_core.cpp /OUT:VCORE_CPU.exe

      - name: Install Dependencies
        run: pip install torch safetensors numpy pyinstaller customtkinter

      # 2. ПРЯМАЯ УПАКОВКА (Без капризов с путями)
      - name: Bundle GUI Application
        shell: pwsh
        run: |
          # Копируем всё в одну папку "build_zone" для идеального качества сборки
          New-Item -ItemType Directory -Path "./build_zone"
          Copy-Item "./VCORE_GPU.exe" -Destination "./build_zone/VCORE_GPU.exe"
          Copy-Item "./VCORE_CPU.exe" -Destination "./build_zone/VCORE_CPU.exe"
          Copy-Item "./gui_v149.py" -Destination "./build_zone/gui_v149.py"
          
          cd build_zone
          pyinstaller --onefile --noconsole `
            --exclude-module matplotlib --exclude-module notebook --exclude-module PIL `
            --exclude-module huggingface_hub `
            --add-binary "VCORE_GPU.exe;." `
            --add-binary "VCORE_CPU.exe;." `
            --name "Markov_Shield_v149_SIMS" `
            gui_v149.py

      - name: Upload Protected Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v149_FINAL_READY
          path: build_zone/dist/Markov_Shield_v149_SIMS.exe
