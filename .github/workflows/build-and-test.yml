# Build system for Markov Shield AI v144 (Exabit Edition)

name: V-CORE EXE RELEASE BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # Собираем на Windows для получения родного .exe для Asus X541N
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install torch safetensors huggingface_hub numpy pyinstaller

    - name: Configure CMake (Target Architecture: Tesla T4)
      run: cmake -S . -B build -DCMAKE_CUDA_ARCHITECTURES=75

    - name: Build V144 Core Binary
      run: cmake --build build --config Release

    - name: Execute Exabit Optimization
      run: |
        # Копируем скрипт в папку сборки и запускаем сжатие Qwen
        cp bridge_compressor.py build/Release/
        cd build/Release
        python bridge_compressor.py

    - name: Bundle Autonomous EXE
      run: |
        # Упаковываем Python-интерфейс и CUDA-ядро в один EXE файл
        # --onefile делает один запускной файл без зависимостей
        pyinstaller --onefile --add-binary "build/Release/LinearSelectorBenchmark.exe;." --name "Markov_Shield_v144" build/Release/bridge_compressor.py

    - name: Create Clean GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v144-exabit-final
        name: "Markov Shield AI v144 (Exabit EXE)"
        draft: false
        prerelease: false
        # Включаем ТОЛЬКО .exe и веса модели. GitHub не добавит zip/gz автоматически в этот список.
        files: |
          dist/Markov_Shield_v144.exe
          build/Release/v144_model.safetensors
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Дополнительный шаг для удаления автоматических архивов исходного кода из релиза
    # (GitHub всегда делает их, но мы помечаем их как "Assets to ignore" через настройки релиза в интерфейсе)
