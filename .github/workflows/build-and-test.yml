# V-CORE v150 - THE GUARANTEED PACK

name: V-CORE v150 FINAL BUILDER

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
      - uses: ilammy/msvc-dev-cmd@v1

      # 1. СБОРКА ЯДЕР
      - name: Build Binary Cores
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          & $nvcc -arch=sm_75 -c LinearSelector.cu -o ./LinearSelector.obj --compiler-options "/O2 /MT /EHsc"
          cl.exe /O2 /MT /EHsc /DUSE_CUDA test_core.cpp ./LinearSelector.obj /I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" /link /LIBPATH:"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" cudart_static.lib Kernel32.lib User32.lib /OUT:VCORE_GPU.exe
          cl.exe /O2 /MT /EHsc test_core.cpp /OUT:VCORE_CPU.exe

      # 2. ПРОВЕРКА (Посмотри этот шаг в логах!)
      - name: Check Files Exist
        run: dir *.exe

      # 3. ВЫГРУЗКА (Используем абсолютный путь, чтобы обойти .gitignore)
      - name: Upload Final Pack
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v150_FIXED_PACK
          # Мы указываем конкретные файлы, это заставит Гитхаб их взять
          path: |
            ${{ github.workspace }}/VCORE_GPU.exe
            ${{ github.workspace }}/VCORE_CPU.exe
            bridge_compressor.py
          if-no-files-found: error
