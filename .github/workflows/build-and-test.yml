name: V-CORE QWEN OPTIMIZER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # Используем стандартный сервер Ubuntu
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install AI Dependencies
      run: |
        pip install torch safetensors huggingface_hub numpy

    - name: Install CUDA Toolkit
      run: |
        # Самый надежный способ установки CUDA на GitHub Actions
        sudo apt-get update
        sudo apt-get install -y nvidia-cuda-toolkit

    - name: Configure CMake
      run: |
        # Указываем архитектуру Tesla T4 (75)
        cmake -S . -B build -DCMAKE_CUDA_ARCHITECTURES=75

    - name: Build V144 Core
      run: cmake --build build --config Release

    - name: Run Qwen Optimization
      run: |
        # Копируем скрипт в папку сборки и запускаем процесс сжатия
        cp bridge_compressor.py build/
        cd build
        chmod +x LinearSelectorBenchmark
        python bridge_compressor.py

    - name: Upload Optimized Model
      uses: actions/upload-artifact@v4
      with:
        name: v144-qwen-coder
        path: build/v144_*.safetensors
