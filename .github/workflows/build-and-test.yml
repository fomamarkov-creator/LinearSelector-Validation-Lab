# Build system for 🛡️ Markov Shield AI v144 (Exabit Edition)

name: V-CORE EXE RELEASE BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
          method: 'network'
          # Ставим основные компоненты
          sub-packages: '["nvcc", "cudart", "visual_studio_integration"]'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install torch safetensors huggingface_hub numpy pyinstaller

      - name: Configure CMake
        shell: pwsh
        run: |
          # Принудительно задаем переменные окружения, чтобы CMake не потерялся
          $env:CUDA_PATH = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8"
          $env:CUDA_TOOLKIT_ROOT_DIR = $env:CUDA_PATH
          $env:PATH = "$env:CUDA_PATH\bin;$env:PATH"
          
          # Запуск конфигурации с явным указанием генератора для Visual Studio
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_CUDA_ARCHITECTURES=75 `
          -DCMAKE_CUDA_COMPILER="C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v11.8/bin/nvcc.exe"

      - name: Build V144 Core Binary
        run: cmake --build build --config Release

      - name: Execute Exabit Optimization
        run: |
          Copy-Item "bridge_compressor.py" -Destination "build/Release/" -Force
          cd build/Release
          python bridge_compressor.py

      - name: Bundle Autonomous EXE
        run: pyinstaller --onefile --add-binary "build/Release/LinearSelectorBenchmark.exe;." --name "Markov_Shield_v144" build/Release/bridge_compressor.py

      - name: Create Clean GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v144-exabit-final
          name: "Markov Shield AI v144 (Exabit EXE)"
          files: |
            dist/Markov_Shield_v144.exe
            build/Release/v144_model.safetensors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
