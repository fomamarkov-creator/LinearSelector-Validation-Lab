# V-CORE v146 UNIVERSAL (Direct Files Edition)

name: V-CORE v146 UNIVERSAL BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
          method: 'network'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # СБОРКА 1: GPU Версия
      - name: Build GPU Version
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          & $nvcc -arch=sm_75 -c LinearSelector.cu -o LinearSelector.obj -allow-unsupported-compiler --compiler-options "/O2 /MD /EHsc /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH"
          cl.exe /O2 /MD /EHsc /DUSE_CUDA test_core.cpp LinearSelector.obj /I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" /link /LIBPATH:"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" cudart.lib /NODEFAULTLIB:LIBCMT /OUT:VCORE_GPU.exe

      # СБОРКА 2: CPU Версия
      - name: Build CPU Version
        shell: pwsh
        run: |
          cl.exe /O2 /MD /EHsc test_core.cpp /OUT:VCORE_CPU.exe

      # ГАРАНТИРОВАННАЯ ВЫГРУЗКА БЕЗ ПИЗОНОВСКИХ ОШИБОК
      - name: Upload All Components
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v146_READY_TO_RUN
          path: |
            VCORE_GPU.exe
            VCORE_CPU.exe
            bridge_compressor.py
