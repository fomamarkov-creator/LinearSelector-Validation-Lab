# V-CORE v151 - THE FINAL MONOLITH

name: V-CORE v151 FINAL

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build Core
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          # Компилируем всё в один MARKOV_CORE.exe
          & $nvcc -arch=sm_75 -o MARKOV_CORE.exe LinearSelector.cu test_core.cpp -I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" -L"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" -lcudart --compiler-options "/O2 /MT /EHsc"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_FINAL_ASSEMBLY
          path: MARKOV_CORE.exe
