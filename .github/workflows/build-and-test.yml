# V-CORE v150 - FINAL UNSTOPPABLE BUILD

name: V-CORE v150 FINAL

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write # Разрешаем запись на уровне кода

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build Binary Cores
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          & $nvcc -arch=sm_75 -o VCORE_GPU.exe LinearSelector.cu test_core.cpp -I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" -L"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" -lcudart --compiler-options "/O2 /MT /EHsc"
          cl.exe /O2 /MT /EHsc test_core.cpp /OUT:VCORE_CPU.exe

      # СТРАХОВКА 1: Выгружаем в обычные Артефакты (100% сработает)
      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v150_FIXED
          path: "*.exe"

      # СТРАХОВКА 2: Создаем официальный Релиз
      - name: Create Official Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v150-final-${{ github.run_number }}
          name: V-CORE v150 FINAL (LIGO READY)
          files: |
            VCORE_GPU.exe
            VCORE_CPU.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
