name: V-CORE EXE RELEASE BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install AI Tools
      run: |
        pip install torch safetensors huggingface_hub numpy pyinstaller

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_CUDA_ARCHITECTURES=75

    - name: Build C++ Core
      run: cmake --build build --config Release

    - name: Run Optimization
      run: |
        cp bridge_compressor.py build/Release/
        cd build/Release
        python bridge_compressor.py

    - name: Create Autonomous EXE
      run: |
        # Собираем всё в один файл для оффлайн запуска на Asus
        pyinstaller --onefile --add-binary "build/Release/LinearSelectorBenchmark.exe;." --name "Markov_Shield_v144" build/Release/bridge_compressor.py

    - name: Publish Clean Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v144-exabit-final
        name: "Markov Shield AI v144 (Exabit EXE)"
        files: |
          dist/Markov_Shield_v144.exe
          build/Release/v144_model.safetensors
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
