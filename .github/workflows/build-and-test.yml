# V-CORE v149 - THE ULTIMATE SIMS-MATRIX INTERFACE

name: V-CORE v149 GUI BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
          method: 'network'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # СБОРКА ЯДЕР (GPU и CPU)
      - name: Build Binary Cores
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          & $nvcc -arch=sm_75 -c LinearSelector.cu -o ./LinearSelector.obj --compiler-options "/O2 /MT /EHsc /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH"
          cl.exe /O2 /MT /EHsc /DUSE_CUDA test_core.cpp ./LinearSelector.obj /I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" /link /LIBPATH:"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" cudart_static.lib Kernel32.lib User32.lib /OUT:VCORE_GPU.exe
          cl.exe /O2 /MT /EHsc test_core.cpp /OUT:VCORE_CPU.exe

      # УСТАНОВКА БИБЛИОТЕК ДЛЯ ИНТЕРФЕЙСА
      - name: Install GUI Dependencies
        run: pip install torch safetensors numpy pyinstaller customtkinter

      # ФИНАЛЬНАЯ УПАКОВКА В ОДИН КРАСИВЫЙ EXE
      - name: Bundle GUI Application
        shell: pwsh
        run: |
          pyinstaller --onefile --noconsole `
            --exclude-module matplotlib --exclude-module notebook --exclude-module PIL `
            --add-binary "VCORE_GPU.exe;." `
            --add-binary "VCORE_CPU.exe;." `
            --name "Markov_Shield_v149_SIMS_INTERFACE" `
            gui_v149.py

      - name: Upload Final Interface
        uses: actions/upload-artifact@v4
        with:
          name: V-CORE_v149_GUI_READY
          path: dist/Markov_Shield_v149_SIMS_INTERFACE.exe
