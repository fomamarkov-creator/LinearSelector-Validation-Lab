name: V-CORE v150 RELEASE

on:
  push:
    branches: [ "main" ] # Сработает сразу при пуше в основную ветку
  workflow_dispatch:      # Позволит запустить вручную кнопкой

jobs:
  build:
    runs-on: windows-2022
    permissions: # Важно! Разрешаем Гитхабу создавать релизы
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build Binary Cores
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          & $nvcc -arch=sm_75 -o VCORE_GPU.exe LinearSelector.cu test_core.cpp -I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" -L"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" -lcudart --compiler-options "/O2 /MT /EHsc"
          cl.exe /O2 /MT /EHsc test_core.cpp /OUT:VCORE_CPU.exe

      - name: Create Official Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v150-final-${{ github.run_number }}
          name: V-CORE v150 FINAL (24 JUNE READY)
          files: |
            VCORE_GPU.exe
            VCORE_CPU.exe
            bridge_compressor.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
