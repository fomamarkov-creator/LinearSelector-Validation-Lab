# Build system for 🛡️ Markov Shield AI v146 (Offline LIGO Edition)
name: V-CORE v146 UNIVERSAL BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
          method: 'network'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # СБОРКА 1: GPU Версия (CUDA)
      - name: Build GPU Version
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          & $nvcc -arch=sm_75 -c LinearSelector.cu -o LinearSelector.obj -D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH -allow-unsupported-compiler
          cl.exe /O2 /MD /EHsc /DUSE_CUDA test_core.cpp LinearSelector.obj /I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" /link /LIBPATH:"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" cudart.lib /OUT:VCORE_GPU.exe

      # СБОРКА 2: CPU Версия (Для смартфонов и простых ПК)
      - name: Build CPU Version
        shell: pwsh
        run: |
          cl.exe /O2 /MD /EHsc test_core.cpp /OUT:VCORE_CPU.exe

      - name: Install PyInstaller
        run: pip install torch safetensors numpy pyinstaller

      - name: Bundle Both to EXE
        run: |
          pyinstaller --onefile --add-binary "VCORE_GPU.exe;." --add-binary "VCORE_CPU.exe;." --name "Markov_Shield_v146_UNIVERSAL" bridge_compressor.py

      - name: Upload Universal Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v146_UNIVERSAL_READY
          path: dist/Markov_Shield_v146_UNIVERSAL.exe
