# Build system for 🛡️ Markov Shield AI v144 (Exabit Edition)

name: V-CORE EXE RELEASE BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ДОБАВЛЯЕМ КЭШИРОВАНИЕ CUDA (Чтобы сборка была быстрой)
      - name: Cache CUDA
        id: cache-cuda
        uses: actions/cache@v3
        with:
          path: 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8'
          key: ${{ runner.os }}-cuda-11.8

      - name: Install CUDA Toolkit
        if: steps.cache-cuda.outputs.cache-hit != 'true'
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
          method: 'network'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install torch safetensors huggingface_hub numpy pyinstaller
          choco install ninja

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        shell: pwsh
        run: |
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8"
          $env:CUDA_PATH = $cudaPath
          $env:PATH = "$cudaPath\bin;$env:PATH"
          
          # Используем Ninja и ПРЯМЫЕ пути, чтобы не зависеть от версии Visual Studio
          cmake -S . -B build -G "Ninja" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_CUDA_COMPILER="$cudaPath\bin\nvcc.exe" `
          -DCMAKE_C_COMPILER="cl.exe" `
          -DCMAKE_CXX_COMPILER="cl.exe" `
          -DCMAKE_CUDA_ARCHITECTURES=75

      - name: Build V144 Core Binary
        run: cmake --build build --config Release

      - name: Execute Exabit Optimization
        shell: pwsh
        run: |
          Copy-Item "bridge_compressor.py" -Destination "build/" -Force
          cd build
          python bridge_compressor.py

      - name: Bundle Autonomous EXE
        run: |
          pyinstaller --onefile `
          --add-binary "build/LinearSelectorBenchmark.exe;." `
          --name "Markov_Shield_v144" `
          build/bridge_compressor.py

      - name: Create Clean GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v144-exabit-final
          name: "Markov Shield AI v144 (Exabit EXE)"
          files: |
            dist/Markov_Shield_v144.exe
            build/v144_model.safetensors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
