name: Manual Build LinearSelector V144

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Добавляет кнопку ручного запуска в интерфейсе GitHub

jobs:
  build-windows:
    name: Build EXE (Windows + CUDA)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install CUDA Toolkit
      uses: jimmy-park/install-cuda-action@v1.7
      with:
        cuda_version: '12.1.0'
        method: 'network'

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_ARCHITECTURES=80

    - name: Build Project
      run: |
        cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LinearSelector-V144-Windows-EXE
        path: build/Release/LinearSelectorBenchmark.exe
        retention-days: 5
