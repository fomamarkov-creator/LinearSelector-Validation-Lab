name: Production Release & Validation V144

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  # 1. Сборка для Linux и подготовка README
  build-linux-and-docs:
    name: Ubuntu Build & Docs
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install CUDA (Linux)
      run: |
        sudo apt-get update && sudo apt-get install -y nvidia-cuda-toolkit

    - name: Build Project
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_ARCHITECTURES=80
        cmake --build build --config Release

    - name: Generate Production README
      run: |
        cat <<EOF > README.md
        # LinearSelector-Validation-Lab 🧪

        Математическая верификация и стресс-тестирование алгоритма линейной селекции в нерефлексивных пространствах.

        🎯 **Цель проекта**
        Подтвердить превосходство алгоритма над стандартными методами оптимизации NVIDIA (Baseline).

        📊 **Сравнительный анализ производительности (Benchmark)**

        | Метрика | Стандарт (NVIDIA Baseline) | LinearSelector V144 | Превосходство |
        | :--- | :--- | :--- | :--- |
        | **Скорость вычислений** | [Впишите ms] | **[Впишите ms]** | **[?]%** |
        | **Пропускная способность** | [Впишите GB/s] | **[Впишите GB/s]** | **[?]%** |

        📦 **Релизные артефакты (V144-Protected)**
        1. 🐧 **Linux Binary:** \`LinearSelectorBenchmark\`
        2. 🪟 **Windows EXE:** \`LinearSelectorBenchmark.exe\`

        🛠 **Технологический стек**
        - **Ядро:** C++ / CUDA (compute_80+)
        - **Защита:** Markov Shield AI
        EOF

    - name: Commit and Push README
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add README.md
        git commit -m "📊 Prepare README [skip ci]" || echo "No changes"
        git push

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LinearSelector-V144-Linux
        path: build/LinearSelectorBenchmark

  # 2. МАКСИМАЛЬНО НАДЕЖНАЯ сборка для Windows через Ninja
  build-windows:
    name: Windows EXE Build
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Ninja
      run: choco install ninja

    - name: Configure and Build (Windows)
      shell: pwsh
      run: |
        # Подхватываем CUDA 12.1
        $env:CUDA_PATH = $env:CUDA_PATH_V12_1
        $env:PATH = "$env:CUDA_PATH\bin;$env:PATH"
        
        # Используем Ninja вместо тяжелой Visual Studio, чтобы избежать ошибок "Instance не найден"
        cmake -B build -G "Ninja" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_CUDA_COMPILER="$env:CUDA_PATH\bin\nvcc.exe" `
          -DCMAKE_CUDA_ARCHITECTURES=80
          
        cmake --build build --config Release

    - name: Upload Windows EXE
      uses: actions/upload-artifact@v4
      with:
        name: LinearSelector-V144-Windows-EXE
        path: build/LinearSelectorBenchmark.exe
