# V-CORE v152.8 - COMPILER OVERRIDE

name: V-CORE v152.8 FULL ASSEMBLY

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch safetensors numpy pyinstaller customtkinter huggingface_hub

      - name: Build Engine with NVCC
        run: |
          $env:PATH = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin;" + $env:PATH
          
          $cuda_inc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include"
          $cuda_lib = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64"
          
          # ДОБАВЛЕН ФЛАГ -allow-unsupported-compiler ДЛЯ ОБХОДА ПРОВЕРКИ VS2022
          nvcc -O3 main.cpp LinearSelector.cu -o VCORE_v147_STATIC_GPU.exe `
          -I $cuda_inc -L $cuda_lib `
          -lcudart -allow-unsupported-compiler -D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH
          
          if (Test-Path "VCORE_v147_STATIC_GPU.exe") { echo "V-CORE ENGINE BUILT" } else { exit 1 }

      - name: Bundle with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name "MARKOV_ENGINE_v152" `
          --add-binary "VCORE_v147_STATIC_GPU.exe;." `
          --hidden-import "huggingface_hub" `
          gui_v149.2.py

      - name: Upload V-CORE Release
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v152_FINAL_DIST
          path: dist/MARKOV_ENGINE_v152.exe
