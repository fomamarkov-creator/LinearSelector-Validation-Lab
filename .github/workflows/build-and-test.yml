# V-CORE v148 FINAL (Direct Artifact Edition)

name: V-CORE v148 FLASH BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
          method: 'network'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Static GPU Core
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          & $nvcc -arch=sm_75 -c LinearSelector.cu -o LinearSelector.obj --compiler-options "/O2 /MT /EHsc /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH"
          cl.exe /O2 /MT /EHsc /DUSE_CUDA test_core.cpp LinearSelector.obj /I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" /link /LIBPATH:"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" cudart_static.lib Kernel32.lib User32.lib /OUT:VCORE_GPU.exe

      - name: Build CPU Core
        shell: pwsh
        run: |
          cl.exe /O2 /MT /EHsc test_core.cpp /OUT:VCORE_CPU.exe

      # Прямая выгрузка всех файлов в один архив без упаковщика
      - name: Upload All Components
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v148_READY_TO_RUN
          path: |
            VCORE_GPU.exe
            VCORE_CPU.exe
            bridge_compressor.py
            README.md
