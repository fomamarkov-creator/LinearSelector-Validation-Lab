# V-CORE v147 STATIC & MOBILE (Resonance 144Hz)

name: V-CORE v147 STATIC BUILDER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '11.8.0'
          method: 'network'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # СБОРКА 1: GPU СТАТИЧЕСКАЯ (Все DLL внутри!)
      - name: Build Static GPU Version
        shell: pwsh
        run: |
          $nvcc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\bin\nvcc.exe"
          # Компилируем со статическим рантаймом /MT
          & $nvcc -arch=sm_75 -c LinearSelector.cu -o LinearSelector.obj `
            -I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" `
            -allow-unsupported-compiler `
            --compiler-options "/O2 /MT /EHsc /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH"

          # Линкуем со статической библиотекой CUDA (cudart_static.lib)
          cl.exe /O2 /MT /EHsc /DUSE_CUDA test_core.cpp LinearSelector.obj `
            /I"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\include" `
            /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH `
            /link /LIBPATH:"C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.8\lib\x64" `
            cudart_static.lib /OUT:VCORE_v147_STATIC_GPU.exe

      # СБОРКА 2: CPU Универсальная (Для Realme и ПК без NVIDIA)
      - name: Build Mobile/CPU Version
        shell: pwsh
        run: |
          cl.exe /O2 /MT /EHsc test_core.cpp /OUT:VCORE_v147_MOBILE_CPU.exe

      # ВЫГРУЗКА АРТЕФАКТОВ
      - name: Upload V-CORE v147
        uses: actions/upload-artifact@v4
        with:
          name: VCORE_v147_FINAL_PACK
          path: |
            VCORE_v147_STATIC_GPU.exe
            VCORE_v147_MOBILE_CPU.exe
            bridge_compressor.py
            README.md
