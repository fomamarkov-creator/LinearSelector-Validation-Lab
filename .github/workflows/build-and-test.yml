name: Manual Build LinearSelector V144

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-windows:
    name: Build EXE (Windows + CUDA)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.21
      with:
        cuda: '12.1.0'
        method: 'network'

    - name: Configure CMake
      shell: bash
      run: |
        export CUDA_PATH=$CUDA_PATH_V12_1
        export PATH=$CUDA_PATH/bin:$PATH
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_ARCHITECTURES=80 -DCMAKE_CUDA_COMPILER="$CUDA_PATH/bin/nvcc.exe"

    - name: Build Project
      run: |
        cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LinearSelector-V144-Windows-EXE
        path: build/Release/LinearSelectorBenchmark.exe
        retention-days: 5
