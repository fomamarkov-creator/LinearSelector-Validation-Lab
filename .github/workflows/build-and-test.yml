name: V-CORE QWEN OPTIMIZER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # ШАГ 1: ОЧИСТКА МЕСТА НА ДИСКЕ (Решение ошибки "No space left")
    - name: Maximize Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h # Показать сколько места освободилось

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install AI Dependencies
      run: |
        pip install torch safetensors huggingface_hub numpy

    - name: Install CUDA Toolkit
      run: |
        sudo apt-get update
        sudo apt-get install -y nvidia-cuda-toolkit

    - name: Configure CMake
      run: |
        cmake -S . -B build -DCMAKE_CUDA_ARCHITECTURES=75

    - name: Build V144 Core
      run: cmake --build build --config Release

    - name: Run Qwen Optimization
      run: |
        cp bridge_compressor.py build/
        cd build
        chmod +x LinearSelectorBenchmark
        python bridge_compressor.py

    - name: Upload Optimized Model
      uses: actions/upload-artifact@v4
      with:
        name: v144-qwen-coder
        path: build/v144_*.safetensors
