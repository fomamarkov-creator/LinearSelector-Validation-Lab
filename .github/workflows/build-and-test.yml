name: V-CORE EXE BUILDER (OFFLINE READY)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # Переключаемся на Windows для создания .exe
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Build Dependencies
      run: |
        pip install torch safetensors huggingface_hub numpy pyinstaller

    - name: Install CUDA Toolkit
      # На Windows-серверах GitHub CUDA уже часто предустановлена, проверим её
      run: |
        nvcc --version

    - name: Configure CMake
      run: |
        cmake -S . -B build -DCMAKE_CUDA_ARCHITECTURES=75

    - name: Build V144 Core
      run: cmake --build build --config Release

    - name: Run Qwen Optimization (Generate Weights)
      run: |
        cp bridge_compressor.py build/
        cd build
        python bridge_compressor.py

    - name: Bundle into One-File EXE
      run: |
        # Собираем Python-мостик и CUDA-бинарник в один файл
        pyinstaller --onefile --add-binary "build/Release/LinearSelectorBenchmark.exe;." --name "Markov_Shield_AI_v144" build/bridge_compressor.py

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v144-exabit-final
        name: "Markov Shield AI v144 (Exabit EXE)"
        draft: false
        prerelease: false
        # Загружаем только EXE и сжатые веса, НИКАКИХ zip/gz
        files: |
          dist/Markov_Shield_AI_v144.exe
          build/v144_model.safetensors
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
