name: Manual Build LinearSelector V144

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-linux:
    name: Build & Test (Ubuntu + CUDA)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install CUDA Core
      run: |
        wget https://nvidia.com
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo apt-get update
        sudo apt-get install -y cuda-nvcc-12-1 cuda-cudart-dev-12-1

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_ARCHITECTURES=80 -DCMAKE_CUDA_COMPILER=/usr/local/cuda-12.1/bin/nvcc

    - name: Build Project
      run: |
        cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LinearSelector-V144-Binary
        path: build/LinearSelectorBenchmark
